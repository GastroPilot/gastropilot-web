name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'i18n/**'
      - 'lib/**'
      - 'messages/**'
      - 'public/**'
      - 'middleware.ts'
      - 'next.config.ts'
      - 'next-env.d.ts'
      - 'postcss.config.mjs'
      - 'tailwind.config.ts'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.github/workflows/ci-cd.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag'
        required: true
        type: choice
        options:
          - test
          - staging
          - demo

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-web

jobs:
  # ============================================
  # CI – runs on every push and PR
  # ============================================

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check || echo "format:check not configured, skipping"

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

  # ============================================
  # CD – Docker Build & Push to Docker Hub
  # ============================================

  deploy:
    name: Deploy to Docker Hub
    runs-on: ubuntu-latest
    needs: [lint, build-check]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=test" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine RC version
        id: rc
        run: |
          VERSION=$(node -p "require('./package.json').version")
          RC_VERSION="${VERSION}-rc.${{ github.run_number }}"
          BUILD_DATE=$(date +%Y%m%d-%H%M%S)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "rc_version=${RC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

      - name: Create RC tag
        env:
          RC_VERSION: ${{ steps.rc.outputs.rc_version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${RC_VERSION}" -m "RC ${RC_VERSION}" || true
          git push origin "v${RC_VERSION}" || true

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.DOCKERHUB_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.rc.outputs.rc_version }}
            NEXT_PUBLIC_BUILD_DATE=${{ steps.rc.outputs.build_date }}
